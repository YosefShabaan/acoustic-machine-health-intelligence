name: Bug Report
description: Report a reproducible code, workflow, or documentation bug.
title: "BUG - "
labels:
  - type:bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Which workflow, machine scope, file, or command is affected?
      placeholder: "Example: Fan id_00 minus6dB end-to-end smoke, CI unit tests, dashboard rendering."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide the smallest safe command or action sequence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Include the inspected output, traceback, or CI log excerpt. Do not attach large artifacts.
    validations:
      required: true
  - type: checkboxes
    id: guardrails
    attributes:
      label: Guardrails
      options:
        - label: I did not attach or commit raw datasets, WAV files, NumPy arrays, model weights, generated indexes, or generated scientific artifacts.
          required: true
        - label: This report does not add RUL, root-cause, confidence, or probability claims.
          required: true
