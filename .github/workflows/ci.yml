name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  compile:
    name: compile
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        env:
          SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL: "True"
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q src scripts tests app

  unit-tests:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        env:
          SKLEARN_ALLOW_DEPRECATED_SKLEARN_PACKAGE_INSTALL: "True"
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install -r requirements.txt
      - name: Run unit tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python -m unittest discover -s tests -p "test_*.py"

  large-artifact-guard:
    name: large-artifact guard
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Check tracked files
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          forbidden_suffixes = {
              ".wav",
              ".pt",
              ".pth",
              ".npy",
              ".npz",
              ".pkl",
              ".zip",
              ".tar",
              ".gz",
          }
          forbidden_dirs = {
              "data/raw",
              "data/processed",
              "models_store",
              "chroma_store",
          }
          max_bytes = 1_000_000

          raw = subprocess.check_output(["git", "ls-files", "-z"])
          files = [item.decode("utf-8") for item in raw.split(b"\0") if item]
          violations = []

          for file_name in files:
              path = Path(file_name)
              normalized = file_name.replace("\\", "/")
              suffixes = set(path.suffixes)
              if path.suffix in forbidden_suffixes or suffixes.intersection(forbidden_suffixes):
                  violations.append(f"forbidden artifact extension: {file_name}")
              if any(normalized == item or normalized.startswith(item + "/") for item in forbidden_dirs):
                  if not normalized.endswith("/.gitkeep") and not normalized.endswith("/README.md"):
                      violations.append(f"forbidden generated artifact directory: {file_name}")
              if path.exists() and path.is_file() and path.stat().st_size > max_bytes:
                  violations.append(f"tracked file exceeds {max_bytes} bytes: {file_name}")

          if violations:
              print("Large/scientific artifact guard failed:")
              for violation in violations:
                  print(f"- {violation}")
              sys.exit(1)

          print(f"Checked {len(files)} tracked files; no large scientific artifacts found.")
          PY
